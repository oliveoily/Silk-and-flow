
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f5f0eb">
<title>Silk & Flow</title>
<link rel="manifest" href="#" id="manifest-link">
<style>
  :root {
    --silk-cream: #f9f6f2;
    --silk-warm: #f0e9e0;
    --silk-rose: #e8d5cc;
    --silk-mauve: #c9a99a;
    --silk-deep: #8b6b61;
    --silk-text: #3d2b26;
    --silk-text-soft: #7a5c55;
    --silk-accent: #b5715e;
    --silk-success: #7a9e7e;
    --silk-info: #7a8fae;
    --silk-gold: #c9a84c;
    --shadow-soft: 0 2px 12px rgba(61,43,38,0.08);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: var(--silk-cream);
    color: var(--silk-text);
    min-height: 100vh;
    max-width: 420px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  .app-header {
    background: linear-gradient(135deg, #3d2b26 0%, #6b4a43 50%, #8b6b61 100%);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .app-title {
    font-size: 22px;
    font-weight: normal;
    color: #f9f6f2;
    letter-spacing: 1px;
    font-style: italic;
  }

  .app-subtitle {
    font-size: 11px;
    color: #c9a99a;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
    font-family: 'Arial', sans-serif;
    font-style: normal;
  }

  .tab-bar {
    display: flex;
    background: #3d2b26;
    border-bottom: 1px solid rgba(201,169,154,0.2);
  }

  .tab-btn {
    flex: 1;
    padding: 10px 4px;
    background: none;
    border: none;
    color: #c9a99a;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'Arial', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
  }

  .tab-btn.active {
    color: #f9f6f2;
    border-bottom-color: var(--silk-mauve);
  }

  .screen { display: none; padding: 16px; }
  .screen.active { display: block; }

  /* Cards */
  .card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .card-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--silk-warm);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-body { padding: 14px 16px; }

  /* Level badges */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-family: 'Arial', sans-serif;
    font-weight: bold;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .badge-beginner { background: #e8f4e8; color: #4a7a4e; }
  .badge-intermediate { background: #fef3e2; color: #8a6520; }
  .badge-advanced { background: #fde8e8; color: #8a3030; }

  /* Move cards */
  .move-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
    margin-bottom: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .move-card:active { transform: scale(0.98); }

  .move-card-inner {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .move-icon {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--silk-warm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .move-info { flex: 1; min-width: 0; }

  .move-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--silk-text);
    font-family: 'Arial', sans-serif;
  }

  .move-meta {
    font-size: 11px;
    color: var(--silk-text-soft);
    margin-top: 2px;
    font-family: 'Arial', sans-serif;
  }

  .move-check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--silk-rose);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .move-check.done {
    background: var(--silk-success);
    border-color: var(--silk-success);
    color: white;
  }

  /* Detail view */
  .detail-view {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--silk-cream);
    z-index: 200;
    overflow-y: auto;
    max-width: 420px;
    margin: 0 auto;
  }

  .detail-view.open { display: block; }

  .detail-header {
    background: linear-gradient(135deg, #3d2b26, #6b4a43);
    padding: 20px;
    color: #f9f6f2;
  }

  .back-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #f9f6f2;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 12px;
    display: inline-block;
    font-family: 'Arial', sans-serif;
  }

  .detail-title {
    font-size: 26px;
    font-style: italic;
    font-weight: normal;
    margin-bottom: 6px;
  }

  .detail-body { padding: 16px; }

  .video-placeholder {
    background: #2a1f1b;
    border-radius: var(--radius);
    height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .video-placeholder .play-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(201,169,154,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-bottom: 10px;
  }

  .video-placeholder p {
    color: #c9a99a;
    font-size: 12px;
    font-family: 'Arial', sans-serif;
    text-align: center;
    padding: 0 20px;
  }

  .upload-zone {
    border: 2px dashed var(--silk-rose);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 12px;
    transition: background 0.2s;
  }

  .upload-zone:hover { background: var(--silk-warm); }
  .upload-zone p { font-size: 12px; color: var(--silk-text-soft); font-family: 'Arial', sans-serif; margin-top: 6px; }

  /* Steps */
  .steps-list { list-style: none; }

  .step-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--silk-warm);
  }

  .step-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--silk-rose);
    color: var(--silk-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    flex-shrink: 0;
    font-family: 'Arial', sans-serif;
  }

  .step-text {
    font-size: 13px;
    color: var(--silk-text);
    padding-top: 4px;
    line-height: 1.5;
    font-family: 'Arial', sans-serif;
  }

  /* Next moves section */
  .next-move-btn {
    background: var(--silk-warm);
    border: 1px solid var(--silk-rose);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.2s;
  }

  .next-move-btn:hover { background: var(--silk-rose); }

  .next-move-name { font-size: 13px; font-weight: 600; font-family: 'Arial', sans-serif; color: var(--silk-text); }
  .next-move-desc { font-size: 11px; color: var(--silk-text-soft); font-family: 'Arial', sans-serif; margin-top: 2px; }
  .arrow-icon { color: var(--silk-mauve); font-size: 16px; }

  /* Notes */
  .notes-textarea {
    width: 100%;
    border: 1px solid var(--silk-rose);
    border-radius: var(--radius-sm);
    padding: 10px;
    font-family: 'Georgia', serif;
    font-size: 13px;
    color: var(--silk-text);
    background: white;
    resize: vertical;
    min-height: 80px;
    outline: none;
  }

  .notes-textarea:focus { border-color: var(--silk-mauve); }

  .save-notes-btn {
    background: var(--silk-accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 8px 20px;
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    cursor: pointer;
    margin-top: 8px;
    float: right;
  }

  /* Adventure mode */
  .adventure-card {
    background: linear-gradient(135deg, #3d2b26, #6b4a43);
    border-radius: var(--radius);
    padding: 20px;
    color: #f9f6f2;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .adventure-card::before {
    content: '';
    position: absolute;
    top: -30px;
    right: -30px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(201,169,154,0.1);
  }

  .adventure-prompt {
    font-size: 14px;
    color: #c9a99a;
    margin-bottom: 8px;
    font-family: 'Arial', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 10px;
  }

  .adventure-question {
    font-size: 18px;
    font-style: italic;
    margin-bottom: 14px;
  }

  .adventure-choice {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(201,169,154,0.3);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.2s;
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    color: #f9f6f2;
    width: 100%;
    text-align: left;
  }

  .adventure-choice:hover { background: rgba(201,169,154,0.2); }
  .adventure-choice .choice-name { font-weight: 600; }
  .adventure-choice .choice-hint { font-size: 11px; color: #c9a99a; margin-top: 2px; }

  /* Progress screen */
  .progress-ring {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 10px 0;
  }

  .stat-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .stat-box {
    flex: 1;
    background: white;
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
    box-shadow: var(--shadow-soft);
  }

  .stat-num {
    font-size: 28px;
    font-weight: bold;
    color: var(--silk-accent);
    font-family: 'Arial', sans-serif;
  }

  .stat-label {
    font-size: 10px;
    color: var(--silk-text-soft);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-family: 'Arial', sans-serif;
    margin-top: 2px;
  }

  /* Sequences */
  .sequence-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .sequence-header {
    padding: 14px 16px;
    background: var(--silk-warm);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sequence-name {
    font-size: 15px;
    font-weight: 600;
    font-family: 'Arial', sans-serif;
    color: var(--silk-text);
  }

  .sequence-flow {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .flow-move {
    background: var(--silk-rose);
    color: var(--silk-deep);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'Arial', sans-serif;
    font-weight: 600;
  }

  .flow-arrow {
    color: var(--silk-mauve);
    font-size: 14px;
  }

  /* Section headings */
  .section-heading {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--silk-mauve);
    margin: 20px 0 10px;
    font-family: 'Arial', sans-serif;
  }

  /* Filters */
  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--silk-rose);
    background: white;
    font-size: 11px;
    font-family: 'Arial', sans-serif;
    cursor: pointer;
    color: var(--silk-text-soft);
    transition: all 0.15s;
  }

  .filter-btn.active {
    background: var(--silk-accent);
    border-color: var(--silk-accent);
    color: white;
  }

  /* Add button */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--silk-accent);
    color: white;
    border: none;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(139,107,97,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 150;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: #3d2b26;
    color: #f9f6f2;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Arial', sans-serif;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; }

  /* Install banner */
  .install-banner {
    background: var(--silk-deep);
    color: #f9f6f2;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .install-banner p { font-size: 11px; font-family: 'Arial', sans-serif; line-height: 1.4; }
  .install-banner strong { display: block; font-size: 12px; margin-bottom: 2px; }

  .install-btn {
    background: var(--silk-mauve);
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'Arial', sans-serif;
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
  }

  .dismiss-btn {
    background: none;
    border: none;
    color: rgba(249,246,242,0.6);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    flex-shrink: 0;
  }

  input[type="text"], input[type="url"] {
    width: 100%;
    border: 1px solid var(--silk-rose);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-family: 'Georgia', serif;
    font-size: 13px;
    color: var(--silk-text);
    background: white;
    outline: none;
    margin-bottom: 8px;
  }

  input:focus { border-color: var(--silk-mauve); }

  label.field-label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--silk-text-soft);
    margin-bottom: 4px;
    font-family: 'Arial', sans-serif;
  }
</style>
</head>
<body>

<div id="install-banner" class="install-banner">
  <div>
    <p><strong>Install Silk & Flow</strong>Tap Share → "Add to Home Screen" to install as an app</p>
  </div>
  <button class="install-btn" onclick="dismissBanner()">Got it</button>
  <button class="dismiss-btn" onclick="dismissBanner()">×</button>
</div>

<div class="app-header">
  <div class="app-title">Silk & Flow</div>
  <div class="app-subtitle">Aerial Silks Learning</div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('explore')">Moves</button>
  <button class="tab-btn" onclick="showTab('adventure')">Adventure</button>
  <button class="tab-btn" onclick="showTab('sequences')">Sequences</button>
  <button class="tab-btn" onclick="showTab('progress')">Progress</button>
</div>

<!-- MOVES TAB -->
<div id="screen-explore" class="screen active">
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterMoves('all', this)">All</button>
    <button class="filter-btn" onclick="filterMoves('beginner', this)">Beginner</button>
    <button class="filter-btn" onclick="filterMoves('intermediate', this)">Intermediate</button>
    <button class="filter-btn" onclick="filterMoves('advanced', this)">Advanced</button>
  </div>
  <div id="moves-list"></div>
</div>

<!-- ADVENTURE TAB -->
<div id="screen-adventure" class="screen">
  <div id="adventure-container"></div>
</div>

<!-- SEQUENCES TAB -->
<div id="screen-sequences" class="screen">
  <div id="sequences-list"></div>
  <button class="fab" onclick="showAddSequence()" title="Add sequence">+</button>
</div>

<!-- PROGRESS TAB -->
<div id="screen-progress" class="screen">
  <div id="progress-content"></div>
</div>

<!-- MOVE DETAIL VIEW -->
<div id="detail-view" class="detail-view">
  <div id="detail-content"></div>
</div>

<!-- ADD SEQUENCE MODAL -->
<div id="add-sequence-view" class="detail-view">
  <div class="detail-header">
    <button class="back-btn" onclick="closeAddSequence()">← Back</button>
    <div class="detail-title">New Sequence</div>
  </div>
  <div class="detail-body">
    <label class="field-label">Sequence Name</label>
    <input type="text" id="seq-name-input" placeholder="e.g. Opening Flow">
    <label class="field-label">Moves (comma-separated)</label>
    <input type="text" id="seq-moves-input" placeholder="e.g. Climb, Straddle, Hip Key">
    <label class="field-label">Level</label>
    <div class="filter-row" style="margin-top: 4px;">
      <button class="filter-btn active" id="seq-level-btn-beginner" onclick="selectSeqLevel('beginner')">Beginner</button>
      <button class="filter-btn" id="seq-level-btn-intermediate" onclick="selectSeqLevel('intermediate')">Intermediate</button>
      <button class="filter-btn" id="seq-level-btn-advanced" onclick="selectSeqLevel('advanced')">Advanced</button>
    </div>
    <label class="field-label">Video URL (optional)</label>
    <input type="url" id="seq-video-input" placeholder="https://...">
    <label class="field-label">Notes</label>
    <textarea class="notes-textarea" id="seq-notes-input" placeholder="Describe the flow, transitions, tips..."></textarea>
    <button class="save-notes-btn" onclick="saveSequence()">Save Sequence</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const MOVES = [
  {
    id: 'climb',
    name: 'Basic Climb',
    level: 'beginner',
    icon: '🧗',
    category: 'Foundational',
    description: 'The essential skill for all aerial work — learning to ascend the silks using feet and hands.',
    steps: [
      'Stand between the silks, gripping at shoulder height with thumbs up.',
      'Step one foot onto the silk, wrapping it around the outside of your foot.',
      'Place your second foot on top, pinching the silk between your feet.',
      'Stand through your legs to rise, then re-grip higher with your hands.',
      'Repeat the foot lock and push to continue ascending.'
    ],
    nextMoves: ['s-wrap', 'hip-key', 'straddle-back'],
    exitMoves: ['controlled-descent'],
    conditioning: ['Pull-up negatives', 'Dead hang holds', 'Foot flex exercises'],
    notes: ''
  },
  {
    id: 'foot-lock',
    name: 'Foot Lock',
    level: 'beginner',
    icon: '🦶',
    category: 'Foundational',
    description: 'A secure foot configuration that allows you to bear weight on one foot and transition between positions.',
    steps: [
      'Bring one silk across the top of your foot.',
      'Step the same foot down, catching the silk under your arch.',
      'The silk should be pinched securely between your foot and the standing surface or other foot.',
      'Test weight gradually before committing your full body weight.',
      'Keep the ankle relaxed but the grip firm through the sole of the foot.'
    ],
    nextMoves: ['climb', 'single-foot-lock-hang', 'mermaid'],
    exitMoves: ['controlled-descent'],
    conditioning: ['Calf raises', 'Foot articulation exercises', 'Ankle mobility'],
    notes: ''
  },
  {
    id: 's-wrap',
    name: 'S-Wrap',
    level: 'beginner',
    icon: '〰️',
    category: 'Wraps',
    description: 'One of the first inversions — a beautiful S-shaped wrap that introduces students to inverted positions.',
    steps: [
      'From a standing position, hold both silks and step one fabric behind your back hip.',
      'Reach the same-side arm behind and through to grab the silk.',
      'Keeping tension, tuck your head and roll your hips up into an inversion.',
      'Extend your legs toward the ceiling, finding your balance point.',
      'To come out, gently lower with control, unwrapping in reverse.'
    ],
    nextMoves: ['hip-key', 'mermaid', 'star'],
    exitMoves: ['controlled-descent', 'forward-roll-out'],
    conditioning: ['Hollow body holds', 'Pike stretches', 'Core exercises'],
    notes: ''
  },
  {
    id: 'hip-key',
    name: 'Hip Key',
    level: 'beginner',
    icon: '🔑',
    category: 'Drops & Locks',
    description: 'A versatile position where the silk wraps around the hip, creating a stable "seat" that opens many pathways.',
    steps: [
      'From a climb or standing, pass one silk across your hip from front to back.',
      'Hook the silk in the crease of your hip joint, not on the bony part.',
      'Allow your weight to settle into the hip key — feel the fabric support you.',
      'Release your hands to test balance if desired.',
      'Transition to next move by gently releasing the hip or tilting the pelvis.'
    ],
    nextMoves: ['scorpion', 'hip-key-spin', 'mermaid', 'star'],
    exitMoves: ['controlled-descent', 'caterpillar-walk-down'],
    conditioning: ['Hip flexor stretches', 'Balance exercises', 'Lat strengthening'],
    notes: ''
  },
  {
    id: 'mermaid',
    name: 'Mermaid',
    level: 'intermediate',
    icon: '🧜',
    category: 'Poses',

const SEQUENCES = [
  {
    id: 'seq1',
    name: 'Opening Blossom',
    level: 'beginner',
    moves: ['Climb', 'Foot Lock', 'S-Wrap', 'Hip Key'],
    exitMove: 'Controlled Descent',
    notes: 'A gentle opening sequence to warm up and find confidence at height.',
    video: ''
  },
  {
    id: 'seq2',
    name: 'The Mermaid Flow',
    level: 'intermediate',
    moves: ['Climb', 'Hip Key', 'Mermaid', 'Hip Key Spin', 'Drop'],
    exitMove: 'Seated Landing',
    notes: 'Fluid and feminine — let each transition feel like water. The spin before the drop creates beautiful momentum.',
    video: ''
  },
  {
    id: 'seq3',
    name: 'Star & Sky',
    level: 'intermediate',
    moves: ['Climb', 'S-Wrap', 'Star', 'Scorpion', 'Back Balance'],
    exitMove: 'Pike Out to Descent',
    notes: 'Three dramatic poses connected by smooth transitions. Hold each position for at least 4 counts.',
    video: ''
  }
];

let masteredMoves = JSON.parse(localStorage.getItem('mastered') || '[]');
let userSequences = JSON.parse(localStorage.getItem('userSequences') || '[]');
let userNotes = JSON.parse(localStorage.getItem('notes') || '{}');
let currentLevel = 'all';
let selectedSeqLevel = 'beginner';
let adventureState = { currentMove: null, history: [] };

function saveData() {
  localStorage.setItem('mastered', JSON.stringify(masteredMoves));
  localStorage.setItem('userSequences', JSON.stringify(userSequences));
  localStorage.setItem('notes', JSON.stringify(userNotes));
}

function showTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'progress') renderProgress();
  if (tab === 'adventure') renderAdventure();
  if (tab === 'sequences') renderSequences();
}

function filterMoves(level, btn) {
  currentLevel = level;
  document.querySelectorAll('#screen-explore .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMovesList();
}

function renderMovesList() {
  const filtered = currentLevel === 'all' ? MOVES : MOVES.filter(m => m.level === currentLevel);
  const html = filtered.map(move => `
    <div class="move-card" onclick="openMove('${move.id}')">
      <div class="move-card-inner">
        <div class="move-icon">${move.icon}</div>
        <div class="move-info">
          <div class="move-name">${move.name}</div>
          <div class="move-meta"><span class="badge badge-${move.level}">${move.level}</span> · ${move.category}</div>
        </div>
        <div class="move-check ${masteredMoves.includes(move.id) ? 'done' : ''}" onclick="toggleMastered(event, '${move.id}')">
          ${masteredMoves.includes(move.id) ? '✓' : ''}
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('moves-list').innerHTML = html;
}

function toggleMastered(e, id) {
  e.stopPropagation();
  const idx = masteredMoves.indexOf(id);
  if (idx === -1) { masteredMoves.push(id); showToast('Move mastered! ✨'); }
  else { masteredMoves.splice(idx, 1); }
  saveData();
  renderMovesList();
}

function openMove(id) {
  const move = MOVES.find(m => m.id === id);
  if (!move) return;
  const notes = userNotes[id] || '';
  const stepsHtml = move.steps.map((s, i) => `
    <li class="step-item">
      <div class="step-num">${i + 1}</div>
      <div class="step-text">${s}</div>
    </li>
  `).join('');
  const nextHtml = move.nextMoves.map(next => `
    <button class="next-move-btn" onclick="navigateToMove('${next}')">
      <div>
        <div class="next-move-name">${next.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</div>
        <div class="next-move-desc">Tap to explore this transition path</div>
      </div>
      <span class="arrow-icon">→</span>
    </button>
  `).join('');
  const exitHtml = move.exitMoves.map(e => `
    <button class="next-move-btn" onclick="showToast('Exit via: ${e}')">
      <div>
        <div class="next-move-name" style="color:#8a6520">${e.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</div>
        <div class="next-move-desc">Exit strategy</div>
      </div>
      <span class="arrow-icon" style="color:#c9a84c">↙</span>
    </button>
  `).join('');
  const condHtml = move.conditioning.map(c => `<li style="padding: 4px 0; font-size:13px; font-family: Arial; color: var(--silk-text); border-bottom: 1px solid var(--silk-warm);">${c}</li>`).join('');

  const content = `
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">← Back</button>
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px;">
        <span style="font-size: 32px">${move.icon}</span>
        <div>
          <div class="detail-title">${move.name}</div>
          <span class="badge badge-${move.level}">${move.level}</span>
          <span style="margin-left: 6px; font-size:11px; color: #c9a99a; font-family: Arial;">${move.category}</span>
        </div>
      </div>
    </div>
    <div class="detail-body">
      <p style="font-size:14px; line-height:1.6; color: var(--silk-text-soft); margin-bottom: 16px; font-family: Arial;">${move.description}</p>

      <div class="video-placeholder">
        <div class="play-btn">
          <svg width="18" height="20" viewBox="0 0 18 20"><path d="M2 1l14 9-14 9V1z" fill="#3d2b26"/></svg>
        </div>
        <p>No instructor video yet.<br>Add a video URL in notes below.</p>
      </div>

      <p class="section-heading">Technique Steps</p>
      <ul class="steps-list">${stepsHtml}</ul>

      <p class="section-heading">Next Moves →</p>
      ${nextHtml}

      <p class="section-heading">Exit Plans ↙</p>
      ${exitHtml}

      <p class="section-heading">Conditioning</p>
      <ul style="list-style: none; background: white; border-radius: var(--radius-sm); padding: 0 14px; box-shadow: var(--shadow-soft);">${condHtml}</ul>

      <p class="section-heading">My Notes & Videos</p>
      <label class="field-label">Video URL</label>
      <input type="url" id="note-video-${id}" placeholder="Paste instructor or personal video URL" value="${notes.video || ''}">
      <label class="field-label">Personal Notes</label>
      <textarea class="notes-textarea" id="note-text-${id}" placeholder="What I'm working on, cues that help me, things to remember...">${notes.text || ''}</textarea>
      <button class="save-notes-btn" onclick="saveNotes('${id}')">Save Notes</button>

      <div style="height: 80px;"></div>
    </div>
  `;
  document.getElementById('detail-content').innerHTML = content;
  document.getElementById('detail-view').classList.add('open');
}

function navigateToMove(moveName) {
  const id = moveName.toLowerCase().replace(/\s/g, '-');
  const found = MOVES.find(m => m.id === id || m.name.toLowerCase() === moveName.toLowerCase().replace(/-/g, ' '));
  if (found) { openMove(found.id); }
  else { showToast('This move is coming soon!'); }
}

function closeDetail() {
  document.getElementById('detail-view').classList.remove('open');
}

function saveNotes(id) {
  userNotes[id] = {
    video: document.getElementById(`note-video-${id}`)?.value || '',
    text: document.getElementById(`note-text-${id}`)?.value || ''
  };
  saveData();
  showToast('Notes saved ✓');
}

function renderAdventure() {
  if (!adventureState.currentMove) {
    adventureState.currentMove = MOVES[0];
  }
  const move = adventureState.currentMove;
  const nextOptions = move.nextMoves.slice(0, 3).map(next => {
    const found = MOVES.find(m => m.id === next || m.name.toLowerCase() === next.toLowerCase().replace(/-/g, ' '));
    return { id: next, name: next.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), found };
  });
  const historyHtml = adventureState.history.length > 0 ?
    `<div style="display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;">
      ${adventureState.history.map(h => `<span style="background: rgba(255,255,255,0.15); padding: 3px 10px; border-radius: 20px; font-size: 10px; font-family: Arial; color: #f9f6f2;">${h}</span>`).join('')}
      <span style="color: rgba(201,169,154,0.8); font-size: 20px;">→</span>
    </div>` : '';
  const choicesHtml = nextOptions.map(opt => `
    <button class="adventure-choice" onclick="adventureChoose('${opt.id}', '${opt.name}')">
      <div class="choice-name">${opt.name}</div>
      <div class="choice-hint">${opt.found ? opt.found.category + ' · ' + opt.found.level : 'Tap to explore'}</div>
    </button>
  `).join('');
  document.getElementById('adventure-container').innerHTML = `
    <div class="adventure-card">
      <div class="adventure-prompt">You are currently in</div>
      <div class="adventure-question">${move.icon} ${move.name}</div>
      ${historyHtml}
      <p style="font-size: 12px; color: #c9a99a; font-family: Arial; margin-bottom: 14px;">Where do you flow next?</p>
      ${choicesHtml}
      <button class="adventure-choice" style="background: rgba(201,169,154,0.15); margin-top: 4px;" onclick="adventureExit()">
        <div class="choice-name" style="color: #c9a84c;">↙ Plan an exit</div>
        <div class="choice-hint">${move.exitMoves.join(' or ')}</div>
      </button>
    </div>
    <div class="card">
      <div class="card-body">
        <p style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--silk-mauve); font-family: Arial; margin-bottom: 8px;">About this move</p>
        <p style="font-size: 13px; line-height: 1.6; color: var(--silk-text-soft); font-family: Arial;">${move.description}</p>
        <button style="margin-top: 12px; background: none; border: 1px solid var(--silk-rose); border-radius: 20px; padding: 6px 16px; font-size: 12px; color: var(--silk-accent); cursor: pointer; font-family: Arial;" onclick="openMove('${move.id}')">See full technique →</button>
      </div>
    </div>
    <button style="background: none; border: none; color: var(--silk-mauve); font-family: Arial; font-size: 12px; cursor: pointer; padding: 8px 0; display: block;" onclick="adventureReset()">↺ Start a new adventure</button>
  `;
}

function adventureChoose(id, name) {
  adventureState.history.push(adventureState.currentMove.name);
  if (adventureState.history.length > 4) adventureState.history.shift();
  const found = MOVES.find(m => m.id === id || m.name.toLowerCase() === name.toLowerCase().replace(/-/g, ' '));
  if (found) { adventureState.currentMove = found; }
  else { showToast('This move path is coming soon! Add your own.'); return; }
  renderAdventure();
}

function adventureExit() {
  const move = adventureState.currentMove;
  showToast('Exits: ' + move.exitMoves.join(', '));
}

function adventureReset() {
  adventureState = { currentMove: MOVES[Math.floor(Math.random() * 4)], history: [] };
  renderAdventure();
}

function renderSequences() {
  const all = [...SEQUENCES, ...userSequences];
  let html = '<p class="section-heading">Curated Sequences</p>';
  html += SEQUENCES.map(seq => renderSeqCard(seq, false)).join('');
  if (userSequences.length > 0) {
    html += '<p class="section-heading">My Sequences</p>';
    html += userSequences.map((seq, i) => renderSeqCard(seq, true, i)).join('');
  }
  html += '<div style="height: 80px;"></div>';
  document.getElementById('sequences-list').innerHTML = html;
}

function renderSeqCard(seq, isUser, idx) {
  const flow = seq.moves.map((m, i) =>
    `<span class="flow-move">${m}</span>${i < seq.moves.length - 1 ? '<span class="flow-arrow">→</span>' : ''}`
  ).join('');
  return `
    <div class="sequence-card">
      <div class="sequence-header">
        <div>
          <div class="sequence-name">${seq.name}</div>
          <span class="badge badge-${seq.level}" style="margin-top: 4px; display: inline-block;">${seq.level}</span>
        </div>
        ${isUser ? `<button onclick="deleteSequence(${idx})" style="background: none; border: none; color: var(--silk-mauve); cursor: pointer; font-size: 18px;">×</button>` : ''}
      </div>
      <div class="sequence-flow">${flow}<span style="margin-left: 4px; font-size: 11px; color: var(--silk-gold); font-family: Arial;">↙ ${seq.exitMove}</span></div>
      ${seq.notes ? `<div style="padding: 8px 16px 14px; font-size: 12px; color: var(--silk-text-soft); font-family: Arial; font-style: italic;">"${seq.notes}"</div>` : ''}
    </div>
  `;
}

function renderProgress() {
  const total = MOVES.length;
  const done = masteredMoves.length;
  const byLevel = {
    beginner: { total: MOVES.filter(m => m.level === 'beginner').length, done: 0 },
    intermediate: { total: MOVES.filter(m => m.level === 'intermediate').length, done: 0 },
    advanced: { total: MOVES.filter(m => m.level === 'advanced').length, done: 0 }
  };
  masteredMoves.forEach(id => {
    const m = MOVES.find(x => x.id === id);
    if (m) byLevel[m.level].done++;
  });
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('progress-content').innerHTML = `
    <div class="card" style="text-align: center; padding: 20px 16px;">
      <div style="font-size: 52px; font-weight: bold; color: var(--silk-accent); font-family: Arial;">${pct}%</div>
      <div style="font-size: 13px; color: var(--silk-text-soft); font-family: Arial; margin-top: 4px;">Overall mastery</div>
      <div style="font-size: 12px; color: var(--silk-mauve); font-family: Arial; margin-top: 4px;">${done} of ${total} moves</div>
    </div>

    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-num">${byLevel.beginner.done}/${byLevel.beginner.total}</div>
        <div class="stat-label">Beginner</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">${byLevel.intermediate.done}/${byLevel.intermediate.total}</div>
        <div class="stat-label">Intermediate</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-num">${byLevel.advanced.done}/${byLevel.advanced.total}</div>
        <div class="stat-label">Advanced</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">${userSequences.length}</div>
        <div class="stat-label">My Sequences</div>
      </div>
    </div>

    <p class="section-heading">Mastered Moves</p>
    ${masteredMoves.length === 0 ? '<p style="font-size:13px; color: var(--silk-text-soft); font-family: Arial;">Check off moves as you master them!</p>' :
      masteredMoves.map(id => {
        const m = MOVES.find(x => x.id === id);
        return m ? `<div style="display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: white; border-radius: var(--radius-sm); margin-bottom: 6px; box-shadow: var(--shadow-soft);">
          <span style="font-size:18px;">${m.icon}</span>
          <span style="font-size:13px; font-family: Arial; font-weight: 600;">${m.name}</span>
          <span class="badge badge-${m.level}" style="margin-left: auto;">${m.level}</span>
        </div>` : ''
      }).join('')
    }
  `;
}

function showAddSequence() {
  document.getElementById('add-sequence-view').classList.add('open');
  selectedSeqLevel = 'beginner';
}

function closeAddSequence() {
  document.getElementById('add-sequence-view').classList.remove('open');
}

function selectSeqLevel(level) {
  selectedSeqLevel = level;
  document.querySelectorAll('[id^="seq-level-btn-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('seq-level-btn-' + level).classList.add('active');
}

function saveSequence() {
  const name = document.getElementById('seq-name-input').value.trim();
  const movesRaw = document.getElementById('seq-moves-input').value.trim();
  if (!name || !movesRaw) { showToast('Please fill in name and moves'); return; }
  const moves = movesRaw.split(',').map(m => m.trim()).filter(Boolean);
  const seq = {
    id: 'user-' + Date.now(),
    name,
    level: selectedSeqLevel,
    moves,
    exitMove: moves[moves.length - 1] || 'Descent',
    notes: document.getElementById('seq-notes-input').value.trim(),
    video: document.getElementById('seq-video-input').value.trim()
  };
  userSequences.push(seq);
  saveData();
  closeAddSequence();
  renderSequences();
  showToast('Sequence saved! ✨');
  document.getElementById('seq-name-input').value = '';
  document.getElementById('seq-moves-input').value = '';
  document.getElementById('seq-notes-input').value = '';
  document.getElementById('seq-video-input').value = '';
}

function deleteSequence(idx) {
  userSequences.splice(idx, 1);
  saveData();
  renderSequences();
  showToast('Sequence removed');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function dismissBanner() {
  document.getElementById('install-banner').style.display = 'none';
}

renderMovesList();
</script>
</body>
</html>
